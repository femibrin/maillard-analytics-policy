<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authorization received — Maillard Analytics</title>
<style>
  body { font-family: Georgia, 'Times New Roman', serif; max-width: 560px; margin: 0 auto; padding: 64px 24px; color: #1c1a16; background: #fff; line-height: 1.6; text-align: center; }
  h1 { font-size: 26px; border-bottom: 3px solid #c9a86c; padding-bottom: 14px; }
  .ok { font-size: 40px; color: #1e7a46; }
  .code { font-family: Menlo, monospace; font-size: 12px; background: #f4f2ec; border: 1px solid #e0dbd0; border-radius: 6px; padding: 10px 14px; word-break: break-all; margin: 16px 0; color: #444; }
  p { color: #444; font-size: 15px; }
  .meta { color: #767676; font-size: 12.5px; margin-top: 36px; }
  .err { color: #a33; }
</style>
</head>
<body>
<h1>Maillard Analytics</h1>
<div id="result"></div>
<p class="meta">You can close this window. Your data is retrieved read-only by the operator&rsquo;s secure environment.</p>
<script>
  var q = new URLSearchParams(window.location.search);
  var el = document.getElementById('result');
  if (q.get('code')) {
    el.innerHTML = '<div class="ok">&#10003;</div><p><strong>Authorization received.</strong> TikTok has granted this app read-only access with your consent.</p><div class="code">code: ' + q.get('code').replace(/[<>&]/g,'') + '</div>';
  } else if (q.get('error')) {
    el.innerHTML = '<p class="err"><strong>Authorization was not completed:</strong> ' + q.get('error').replace(/[<>&]/g,'') + '</p>';
  } else {
    el.innerHTML = '<p>Waiting for authorization&hellip; start from the <a href="connect.html">connect page</a>.</p>';
  }
</script>
</body>
</html>
